  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .12);
    }

    p { margin: 0 0 22px; color: #6b7280; line-height: 1.5; }
    label { display: block; margin: 14px 0 6px; font-size: 13px; font-weight: 700; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px 14px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .error { min-height: 20px; margin-top: 12px; color: #dc2626; font-size: 13px; }
    .hint { margin-top: 14px; font-size: 12px; color: #9ca3af; }
  </style>

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function sha256Hex(text) {
      const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function deriveKey(password) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: b64ToBytes(payload.salt),
          iterations: payload.iterations,
          hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    document.getElementById("login").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const usernameHash = await sha256Hex(username + ":" + payload.usernameSalt);
        if (usernameHash !== payload.usernameHash) throw new Error("bad username");
        const key = await deriveKey(password);
        const compressed = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.nonce) },
          key,
          b64ToBytes(payload.ciphertext)
        );
        const stream = new Response(new Blob([compressed]).stream().pipeThrough(new DecompressionStream("deflate")));
        const reportHtml = await stream.text();
        document.open();
        document.write(reportHtml);
        document.close();
      } catch (err) {
        error.textContent = "아이디 또는 비밀번호가 올바르지 않습니다.";
      }
    });
